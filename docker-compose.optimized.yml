services:
  blaiq-core:
    build:
      context: .
      dockerfile: docker/orchestrator/Dockerfile
    container_name: blaiq-core
    command: ["python", "-m", "uvicorn", "src.orchestrator.orchestrator_api:app", "--host", "0.0.0.0", "--port", "6000"]
    ports:
      - "6080:6000"
    environment:
      BLAIQ_DEFAULT_AGENT: ${BLAIQ_DEFAULT_AGENT:-blaiq-graph-rag}
      BLAIQ_GRAPHRAG_AGENT: ${BLAIQ_GRAPHRAG_AGENT:-blaiq-graph-rag}
      BLAIQ_GRAPHRAG_TIMEOUT_SECONDS: ${BLAIQ_GRAPHRAG_TIMEOUT_SECONDS:-180}
      STRATEGIST_ENABLED: ${STRATEGIST_ENABLED:-true}
      LITELLM_STRATEGIST_MODEL: ${LITELLM_STRATEGIST_MODEL:-openai/gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      BLAIQ_SUB_AGENTS: >-
        [{"name":"blaiq-graph-rag","protocol":"rest","base_url":"http://blaiq-graph-rag:6001","execute_path":"/query/graphrag","stream_path":"/query/graphrag/stream","history_path":"/history/{session_id}","supports_stream":true,"capabilities":["graphrag","stream","history"],"method":"POST","timeout_seconds":180},{"name":"echo-agent","protocol":"ws","base_url":"http://blaiq-echo-agent:6002","execute_path":"/execute","stream_path":"/execute","history_path":"","supports_stream":false,"capabilities":["utility"],"method":"POST","timeout_seconds":30}]
    depends_on:
      blaiq-graph-rag:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - blaiq-optimized

  redis:
    image: redis:7-alpine
    container_name: blaiq-redis
    ports:
      - "6006:6379"
    volumes:
      - redis_optimized_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - blaiq-optimized

  blaiq-graph-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blaiq-graph-rag
    command: ["python", "-m", "uvicorn", "src.retriever.retriever_api_optimized:app", "--host", "0.0.0.0", "--port", "6001"]
    ports:
      - "6001:6001"
    environment:
      REDIS_URL: redis://redis:6379
      ENABLE_CACHE: "true"
      CACHE_TTL: 3600

      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-graphrag_chunks}

      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LITELLM_PRE_MODEL: ${LITELLM_PRE_MODEL:-openai/gpt-4o-mini}
      LITELLM_POST_MODEL: ${LITELLM_POST_MODEL:-openai/gpt-4o}
      LITELLM_PLANNER_MODEL: ${LITELLM_PLANNER_MODEL:-openai/gpt-4o}

      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-25}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-4000}

      BGE_M3_SERVICE_URL: ${BGE_M3_SERVICE_URL}
      BGE_M3_API_KEY: ${BGE_M3_API_KEY}

      API_KEY: ${API_KEY}
      ENABLE_RERANKER: ${ENABLE_RERANKER:-false}
      DEBUG_LLM: ${DEBUG_LLM:-true}
      DEBUG_RETRIEVAL: ${DEBUG_RETRIEVAL:-true}

    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blaiq-optimized

  blaiq-echo-agent:
    build:
      context: .
      dockerfile: docker/orchestrator/Dockerfile
    container_name: blaiq-echo-agent
    command: ["python", "-m", "uvicorn", "src.agents.echo_agent:app", "--host", "0.0.0.0", "--port", "6002"]
    ports:
      - "6002:6002"
    environment:
      AGENT_NAME: echo-agent
      AGENT_ENABLE_WS: "true"
      AGENT_CORE_WS_URL: ws://blaiq-core:6000/ws/agents/echo-agent
    depends_on:
      blaiq-core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - blaiq-optimized

networks:
  blaiq-optimized:
    driver: bridge

volumes:
  redis_optimized_data:

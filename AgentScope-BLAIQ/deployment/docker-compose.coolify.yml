services:
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8090}
      DATABASE_URL: ${APP_DATABASE_URL:-postgresql+asyncpg://agentscope_blaiq:agentscope_blaiq@postgres:5432/agentscope_blaiq}
      REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
      UPLOAD_DIR: /app/data/uploads
      ARTIFACT_DIR: /app/data/artifacts
      AGENT_PROFILE_DIR: /app/data/agent_profiles
      LOG_DIR: /app/logs
      DEFAULT_TENANT: ${DEFAULT_TENANT:-default}
      DEFAULT_SOURCE_SCOPE: ${DEFAULT_SOURCE_SCOPE:-web}
      DEFAULT_ARTIFACT_TYPE: ${DEFAULT_ARTIFACT_TYPE:-visual_html}
      LITELLM_PLANNER_MODEL: ${LITELLM_PLANNER_MODEL:-gemini-2.5-pro}
      LITELLM_PRE_MODEL: ${LITELLM_PRE_MODEL:-gemini-2.5-pro}
      LITELLM_POST_MODEL: ${LITELLM_POST_MODEL:-gemini-2.5-pro}
      LITELLM_REFORMAT_MODEL: ${LITELLM_REFORMAT_MODEL:-gemini-2.5-pro}
      LITELLM_TIMEOUT_SECONDS: ${LITELLM_TIMEOUT_SECONDS:-60}
      LITELLM_MAX_OUTPUT_TOKENS: ${LITELLM_MAX_OUTPUT_TOKENS:-1200}
      CONTENT_DIRECTOR_MAX_OUTPUT_TOKENS: ${CONTENT_DIRECTOR_MAX_OUTPUT_TOKENS:-4000}
      VANGOGH_MAX_OUTPUT_TOKENS: ${VANGOGH_MAX_OUTPUT_TOKENS:-16000}
      LITELLM_API_BASE_URL: ${LITELLM_API_BASE_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      MODEL_REASONING_EFFORT: ${MODEL_REASONING_EFFORT:-}
      STRATEGIC_MODEL: ${STRATEGIC_MODEL:-gemini-2.5-pro}
      ROUTING_MODEL: ${ROUTING_MODEL:-gemini-2.5-flash-lite}
      RESEARCH_MODEL: ${RESEARCH_MODEL:-gemini-2.5-pro}
      HITL_MODEL: ${HITL_MODEL:-gemini-2.5-pro}
      TEXT_BUDDY_MODEL: ${TEXT_BUDDY_MODEL:-gemini-2.5-pro}
      VANGOGH_MODEL: ${VANGOGH_MODEL:-vertex_ai/claude-sonnet-4-5@20250929}
      GOVERNANCE_MODEL: ${GOVERNANCE_MODEL:-gemini-2.5-pro}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      HIVEMIND_MCP_RPC_URL: ${HIVEMIND_MCP_RPC_URL:-}
      HIVEMIND_API_KEY: ${HIVEMIND_API_KEY:-}
      HIVEMIND_TIMEOUT_SECONDS: ${HIVEMIND_TIMEOUT_SECONDS:-45}
      HIVEMIND_WEB_POLL_INTERVAL_SECONDS: ${HIVEMIND_WEB_POLL_INTERVAL_SECONDS:-1.0}
      HIVEMIND_WEB_POLL_ATTEMPTS: ${HIVEMIND_WEB_POLL_ATTEMPTS:-10}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      RESEARCH_MAX_DEPTH: ${RESEARCH_MAX_DEPTH:-3}
      RESEARCH_MAX_ITERS: ${RESEARCH_MAX_ITERS:-15}
      ENABLE_GRAPH_AGENT: ${ENABLE_GRAPH_AGENT:-false}
    command: >
      sh -c "python /app/deployment/bootstrap.py --migrate &&
      exec python -m uvicorn agentscope_blaiq.app.main:app
      --host ${APP_HOST:-0.0.0.0}
      --port ${APP_PORT:-8090}"
    dns:
      - 127.0.0.11
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${HOST_PORT:-8090}:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - agentscope_blaiq_uploads:/app/data/uploads
      - agentscope_blaiq_artifacts:/app/data/artifacts
      - agentscope_blaiq_agent_profiles:/app/data/agent_profiles
      - agentscope_blaiq_logs:/app/logs
      - ../src:/app/src
      - ../deployment:/app/deployment
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-3003}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentscope_blaiq}
      POSTGRES_USER: ${POSTGRES_USER:-agentscope_blaiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentscope_blaiq}
    volumes:
      - agentscope_blaiq_postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentscope_blaiq} -d ${POSTGRES_DB:-agentscope_blaiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --bind 0.0.0.0
    volumes:
      - agentscope_blaiq_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  strategist-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    environment:
      STRATEGIC_MODEL: ${STRATEGIC_MODEL:-gemini-2.5-pro}
      REDIS_URL: redis://redis:6379/0
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      HIVEMIND_API_KEY: ${HIVEMIND_API_KEY:-}
      HIVEMIND_MCP_RPC_URL: ${HIVEMIND_MCP_RPC_URL:-}
      HIVEMIND_TIMEOUT_SECONDS: ${HIVEMIND_TIMEOUT_SECONDS:-45}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      DATABASE_URL: ${APP_DATABASE_URL:-postgresql+asyncpg://agentscope_blaiq:agentscope_blaiq@postgres:5432/agentscope_blaiq}
    dns:
      - 127.0.0.11
      - 8.8.8.8
    command: python /app/src/agentscope_blaiq/app/services/strategist_v2.py
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8095:8090"
    volumes:
      - ../src:/app/src
      - ../deployment:/app/deployment
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  research-service:

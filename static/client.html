<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG - Knowledge Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #F25623;
            --primary-light: #ff7a4d;
            --bg-main: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-chat: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #999999;
            --border: #e5e5e5;
            --border-light: #f0f0f0;
            --user-bg: #F25623;
            --assistant-bg: #f7f7f8;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--bg-main);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }

        .status-dot.online {
            background: #22c55e;
        }

        .collection-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            width: 280px;
            outline: none;
            transition: border-color 0.2s;
        }

        .collection-input:focus {
            border-color: var(--primary);
        }

        /* Main Content */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            animation: fadeIn 0.3s ease;
        }

        /* Pipeline Log style */
        .pipeline-terminal {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-bottom: 12px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
        }

        .pipeline-log-entry {
            margin-bottom: 4px;
            display: flex;
            gap: 8px;
        }

        .pipeline-ts {
            color: #569cd6;
        }

        .pipeline-status {
            color: #ce9178;
        }

        .planning-tag {
            background: rgba(242, 86, 35, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 12px;
            font-weight: 500;
        }

        /* Reasoning / Thinking style */
        .reasoning-block {
            background: #fdf6f2;
            border-left: 3px solid var(--primary);
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: #555;
            font-size: 0.9rem;
        }

        .reasoning-title {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .blinking-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--primary);
            margin-left: 4px;
            animation: pulse 1s infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary);
            color: white;
        }

        .message.assistant .message-avatar {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-role {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        .message-text strong {
            font-weight: 600;
        }

        /* Sources Section */
        .sources-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .sources-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .sources-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .source-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .source-chip:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .source-chip svg {
            width: 14px;
            height: 14px;
        }

        /* Metrics Toggle */
        .metrics-toggle {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .metrics-toggle:hover {
            background: var(--bg-secondary);
        }

        .metrics-panel {
            margin-top: 12px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 10px;
            display: none;
        }

        .metrics-panel.show {
            display: block;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .metric-card {
            text-align: center;
            padding: 12px;
            background: var(--bg-main);
            border-radius: 8px;
            border: 1px solid var(--border-light);
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .metric-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .timing-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border-light);
        }

        .timing-row:last-child {
            border-bottom: none;
        }

        .timing-label {
            color: var(--text-secondary);
        }

        .timing-value {
            font-weight: 600;
            color: var(--primary);
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            background: var(--bg-secondary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 24px;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .empty-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 400px;
        }

        /* Input Area */
        .input-container {
            padding: 16px 24px 24px;
            background: var(--bg-main);
            border-top: 1px solid var(--border-light);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(242, 86, 35, 0.1);
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            color: var(--text-primary);
            resize: none;
            outline: none;
            max-height: 200px;
            line-height: 1.5;
            font-family: inherit;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--primary-light);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: #ddd;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Footer hints */
        .input-hints {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .hint-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 0 16px;
            }

            .collection-input {
                width: 180px;
            }

            .messages-container {
                padding: 16px;
            }

            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🔍</div>
            <span>BLAIQ</span>
        </div>
        <div class="header-right">
            <button id="newChat" class="source-chip"
                style="background: var(--bg-secondary); border: 1px solid var(--border); font-size: 0.75rem; font-weight: 600;">+
                New Chat</button>
            <div class="status-badge">
                <span class="status-dot" id="dot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Messages -->
        <div class="messages-container" id="msgBox">
            <div class="empty-state" id="empty">
                <div class="empty-icon">💡</div>
                <h2 class="empty-title">Knowledge Assistant</h2>
                <p class="empty-subtitle">Ask questions about your documents. I'll search through your knowledge base
                    and provide answers with sources.</p>
            </div>
        </div>

        <!-- Input -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Ask anything about your documents..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                    </svg>
                </button>
            </div>
            <div class="input-hints">
                <span class="hint-item">Press Enter to send</span>
                <span class="hint-item">•</span>
                <span class="hint-item">Shift+Enter for new line</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let queryCount = 0;

        const els = {
            send: document.getElementById('sendBtn'),
            input: document.getElementById('userInput'),
            box: document.getElementById('msgBox'),
            empty: document.getElementById('empty'),
            status: document.getElementById('statusText'),
            dot: document.getElementById('dot'),
            newChat: document.getElementById('newChat')
        };

        let SESSION_ID = localStorage.getItem('graphrag_session_id');
        if (!SESSION_ID) {
            SESSION_ID = 'sess_' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('graphrag_session_id', SESSION_ID);
        }

        // Auto-resize textarea
        els.input.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        async function loadHistory() {
            try {
                const r = await fetch(API_URL + "/history/" + SESSION_ID);
                if (r.ok) {
                    const data = await r.json();
                    if (data.history && data.history.length > 0) {
                        if (els.empty) els.empty.style.display = 'none';
                        data.history.forEach(msg => {
                            appendMessage(msg.role === 'user' ? 'user' : 'assistant', msg.content);
                        });
                    }
                }
            } catch (e) {
                console.error("History load error:", e);
            }
        }

        async function health() {
            try {
                const r = await fetch(API_URL + "/");
                if (r.ok) {
                    els.status.innerText = "Online";
                    els.dot.className = "status-dot online";
                }
            } catch (e) {
                els.status.innerText = "Offline";
            }
        }

        els.send.onclick = sendMessage;
        els.newChat.onclick = () => {
            if (confirm("Clear this conversation and start a new chat?")) {
                localStorage.removeItem('graphrag_session_id');
                window.location.reload();
            }
        };
        els.input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };

        async function sendMessage() {
            const text = els.input.value.trim();
            if (!text) return;

            els.input.value = "";
            els.input.style.height = 'auto';

            if (els.empty) {
                els.empty.style.display = 'none';
            }

            appendMessage("user", text);

            const start = performance.now();
            els.status.innerText = "Thinking...";

            // Create assistant message placeholder
            const msgId = "msg_" + Date.now();
            appendMessage("assistant", "", null, msgId);
            const msgEl = document.getElementById(msgId);
            const textEl = msgEl.querySelector('.message-text');

            try {
                const response = await fetch(API_URL + "/query/graphrag/stream", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: text,
                        session_id: SESSION_ID,
                        mode: "local",
                        use_reranker: false,
                        use_cache: true,
                        k: 10
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";
                let metricsData = null;
                let ttfc = null;

                // Pipeline elements
                let terminalEl = null;
                let planningEl = null;

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split("\n");

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const dataStr = line.replace("data: ", "").trim();
                            if (dataStr === "[DONE]") continue;
                            try {
                                const data = JSON.parse(dataStr);

                                // 1. Handle Pipeline Logs
                                if (data.log) {
                                    if (!terminalEl) {
                                        terminalEl = document.createElement('div');
                                        terminalEl.className = 'pipeline-terminal';
                                        textEl.before(terminalEl);
                                    }
                                    const logEntry = document.createElement('div');
                                    logEntry.className = 'pipeline-log-entry';
                                    const ts = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                                    logEntry.innerHTML = `<span class="pipeline-ts">[${ts}]</span> <span class="pipeline-status">${data.log}</span>`;
                                    terminalEl.appendChild(logEntry);
                                    terminalEl.scrollTop = terminalEl.scrollHeight;
                                }

                                // 2. Handle Planning Tags
                                if (data.planning) {
                                    if (!planningEl) {
                                        planningEl = document.createElement('div');
                                        planningEl.className = 'planning-tag';
                                        textEl.before(planningEl);
                                    }
                                    const p = data.planning;
                                    const active = Object.keys(p.search_plan).filter(k => p.search_plan[k]).map(k => k.replace('use_', ''));
                                    planningEl.innerHTML = `🎯 <strong>PLAN:</strong> ${p.mode} &nbsp; | &nbsp; 🧩 <strong>SOURCES:</strong> ${active.join(', ').toUpperCase()}`;
                                }

                                // 3. Handle Streaming Content
                                if (data.delta || data.answer) {
                                    if (ttfc === null) {
                                        ttfc = Math.round(performance.now() - start);
                                        // Once content starts, we can optionally collapse the terminal
                                        if (terminalEl) terminalEl.style.opacity = "0.7";
                                    }
                                    const content = data.delta || data.answer;
                                    fullText += content;
                                    textEl.innerHTML = formatMessage(fullText);
                                    els.box.scrollTop = els.box.scrollHeight;
                                } else if (data.metrics) {
                                    metricsData = data.metrics;
                                }
                            } catch (e) { }
                        }
                    }
                }

                // Add sources if metrics available
                if (metricsData) {
                    addSourcesAndMetrics(msgEl, metricsData, ttfc);
                }

                const elapsed = Math.round(performance.now() - start);
                els.status.innerText = `Online • TTFC: ${ttfc || elapsed}ms`;
                els.dot.className = "status-dot online";
                queryCount++;

            } catch (e) {
                textEl.textContent = "Error: " + e.message;
                els.status.innerText = "Error";
            }
        }

        function formatMessage(text) {
            // First, protect the thinking/reasoning blocks
            // Match <Thinking>...</Thinking> or REASONING...ANSWER
            let processed = text;

            // Handle XML-style Reasoning tags - make them look premium
            processed = processed.replace(/<Thinking>([\s\S]*?)<\/Thinking>/gi, (match, content) => {
                return `<div class="reasoning-block"><div class="reasoning-title">🧠 CORE REASONING</div>${content.trim().replace(/\n/g, '<br>')}</div>`;
            });

            // Handle legacy REASONING/ANSWER blocks if present
            processed = processed.replace(/REASONING\s*\n([\s\S]*?)\n\s*ANSWER/gi, (match, content) => {
                return `<div class="reasoning-block"><div class="reasoning-title">🧠 REASONING</div>${content.trim().replace(/\n/g, '<br>')}</div><div class="reasoning-title">💬 ANSWER</div>`;
            });

            // Standard Markdown-ish
            return processed
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>');
        }

        function appendMessage(role, text, metrics = null, id = null) {
            const div = document.createElement('div');
            div.className = "message " + role;
            if (id) div.id = id;

            const avatar = role === 'user' ? '👤' : '🤖';
            const roleName = role === 'user' ? 'You' : 'Assistant';

            div.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-role">${roleName}</div>
                    <div class="message-text">${formatMessage(text)}</div>
                </div>
            `;

            els.box.appendChild(div);
            els.box.scrollTop = els.box.scrollHeight;
        }

        function addSourcesAndMetrics(msgEl, metrics, ttfc = null) {
            const contentEl = msgEl.querySelector('.message-content');

            // Extract sources from top_sources
            const sources = metrics.top_sources || [];

            if (sources.length > 0) {
                const sourcesHtml = `
                    <div class="sources-section">
                        <div class="sources-label">📄 Sources</div>
                        <div class="sources-list">
                            ${sources.map(s => `
                                <a class="source-chip" href="#" onclick="openSource('${s.doc_id}'); return false;">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                        <polyline points="14 2 14 8 20 8"/>
                                    </svg>
                                    ${cleanDocName(s.doc_id)}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
                contentEl.insertAdjacentHTML('beforeend', sourcesHtml);
            }

            // Add metrics toggle - show TTFC (Time To First Content)
            const timings = metrics.timings || {};
            const srcDist = metrics.sources || {};
            const displayTtfc = ttfc || Math.round((timings.total_retrieval || 0) * 1000);

            const metricsHtml = `
                <button class="metrics-toggle" onclick="toggleMetrics(this)">
                    ⚡ TTFC: ${displayTtfc}ms • Show details
                </button>
                <div class="metrics-panel">
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-value">${srcDist.vector || 0}</div>
                            <div class="metric-label">Vector</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${srcDist.graph || 0}</div>
                            <div class="metric-label">Graph</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${srcDist.keyword || 0}</div>
                            <div class="metric-label">Keyword</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${srcDist.hive_mind || 0}</div>
                            <div class="metric-label">Hive</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${metrics.chunks_retrieved || 0}</div>
                            <div class="metric-label">Final</div>
                        </div>
                    </div>
                    <div class="timing-row">
                        <span class="timing-label">Entity Extraction</span>
                        <span class="timing-value">${Math.round((timings.entity_extraction || 0) * 1000)}ms</span>
                    </div>
                    <div class="timing-row">
                        <span class="timing-label">Retrieval</span>
                        <span class="timing-value">${Math.round((timings.total_retrieval || 0) * 1000)}ms</span>
                    </div>
                    <div class="timing-row">
                        <span class="timing-label">LLM Generation</span>
                        <span class="timing-value">${Math.round((timings.llm_generation || 0) * 1000)}ms</span>
                    </div>
                </div>
            `;
            contentEl.insertAdjacentHTML('beforeend', metricsHtml);
        }

        function cleanDocName(docId) {
            if (!docId) return 'Unknown';
            // Remove hash suffix and clean up
            let name = docId.replace(/_[a-f0-9]{8}$/i, '');
            // Add .pdf if not present
            if (!name.endsWith('.pdf')) name += '.pdf';
            // Truncate if too long
            if (name.length > 40) name = name.substring(0, 37) + '...';
            return name;
        }

        function openSource(docId) {
            // Placeholder - can be customized to open document viewer
            alert(`Opening document: ${docId}\n\nImplement your document viewer integration here.`);
        }

        function toggleMetrics(btn) {
            const panel = btn.nextElementSibling;
            panel.classList.toggle('show');
            btn.textContent = panel.classList.contains('show')
                ? btn.textContent.replace('Show', 'Hide')
                : btn.textContent.replace('Hide', 'Show');
        }

        // Initialize
        loadHistory();
        health();
    </script>

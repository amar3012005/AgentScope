<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG Optimized - Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════════════
           CSS Custom Properties - Daytona Brand Palette
           ═══════════════════════════════════════════════════════════════════════ */
        :root {
            --color-black: #171717;
            --color-orange: #F25623;
            --color-orange-dark: #d94a1d;
            --color-orange-light: #ff6b3d;
            --color-dark-gray: #4D4D4D;
            --color-light-gray: #DEDEDE;
            --color-white: #FFFFFF;
            --color-background: #F5F5F5;
            --color-success: #22c55e;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
            --color-info: #3b82f6;

            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --border-radius: 12px;
            --border-radius-sm: 8px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-background);
            color: var(--color-black);
            min-height: 100vh;
            line-height: 1.5;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--color-black);
            color: var(--color-white);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-brand .logo {
            width: 36px;
            height: 36px;
            background: var(--color-orange);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-brand .logo .material-icons-round {
            font-size: 22px;
            color: var(--color-white);
        }

        .header-brand h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--color-dark-gray);
        }

        .status-indicator.connected {
            background: var(--color-success);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        .status-indicator.connecting {
            background: var(--color-warning);
            animation: pulse 1.5s infinite;
        }

        .status-indicator.error {
            background: var(--color-error);
        }

        .status-text {
            font-size: 0.875rem;
            color: var(--color-light-gray);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 0;
            height: calc(100vh - 70px);
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            background: var(--color-white);
            border-right: 1px solid var(--color-light-gray);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.9375rem;
            line-height: 1.5;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: var(--color-black);
            color: var(--color-white);
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--color-background);
            color: var(--color-black);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 16px 24px 24px;
            background: var(--color-white);
            border-top: 1px solid var(--color-light-gray);
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--color-background);
            border-radius: var(--border-radius);
            padding: 8px 12px;
        }

        .text-input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: var(--font-family);
            font-size: 0.9375rem;
            padding: 8px 4px;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 120px;
        }

        .send-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--color-orange);
            color: var(--color-white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .send-button:hover:not(:disabled) {
            background: var(--color-orange-dark);
            transform: scale(1.05);
        }

        .send-button:disabled {
            background: var(--color-light-gray);
            color: var(--color-dark-gray);
            cursor: not-allowed;
        }

        /* Controls Panel */
        .controls-panel {
            background: var(--color-black);
            color: var(--color-white);
            padding: 24px;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-dark-gray);
            margin-bottom: 12px;
        }

        .info-grid {
            display: grid;
            gap: 8px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius-sm);
        }

        .info-label {
            font-size: 0.8125rem;
            color: var(--color-dark-gray);
        }

        .info-value {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--color-light-gray);
            font-family: 'SF Mono', 'Monaco', monospace;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px;
            color: var(--color-dark-gray);
        }

        .empty-state .material-icons-round {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 8px;
            vertical-align: middle;
        }

        .badge.hit {
            background: #22c55e;
            color: #fff;
        }

        .badge.miss {
            background: #ef4444;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <div class="logo">
                    <span class="material-icons-round">hub</span>
                </div>
                <h1>GraphRAG Optimized</h1>
            </div>

            <div class="header-status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span class="status-text" id="statusText">Disconnected</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="chat-panel">
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state" id="emptyState">
                        <span class="material-icons-round">graphic_eq</span>
                        <h3>Optimized Retrieval</h3>
                        <p>Ask questions to test Redis caching and Parallel Search</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div class="input-container">
                        <textarea class="text-input" id="textInput" placeholder="Enter query..." rows="1"></textarea>
                        <button class="send-button" id="sendButton" title="Send query">
                            <span class="material-icons-round">send</span>
                        </button>
                    </div>
                </div>
            </div>
            <aside class="controls-panel">
                <div class="panel-section">
                    <h4 class="section-title">Performance Metrics</h4>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">Last Latency</span>
                            <span class="info-value" id="lastLatency">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Retrieval Time</span>
                            <span class="info-value" id="retrievalTime">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Cache Status</span>
                            <span class="info-value" id="cacheStatus">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Queries</span>
                            <span class="info-value" id="totalQueries">0</span>
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <h4 class="section-title">Settings</h4>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">Top K</span>
                            <input type="number" id="kInput" value="10"
                                style="background:transparent; border:none; color:white; text-align:right; width:40px;">
                        </div>
                        <div class="info-item">
                            <span class="info-label">Use Cache</span>
                            <input type="checkbox" id="cacheInput" checked>
                        </div>
                    </div>
                    <button onclick="clearCache()"
                        style="margin-top:10px; width:100%; padding:8px; background:#333; color:white; border:none; border-radius:6px; cursor:pointer;">
                        Clear Cache
                    </button>
                </div>
            </aside>
        </main>
    </div>

    <script>
        // Use localhost:8002 directly
        const API_BASE = "http://localhost:8002";

        class GraphRAGClient {
            constructor() {
                this.metrics = { queries: 0 };
                this.setupUI();
                this.checkHealth();
            }

            setupUI() {
                this.chatMessages = document.getElementById('chatMessages');
                this.textInput = document.getElementById('textInput');
                this.sendButton = document.getElementById('sendButton');
                this.emptyState = document.getElementById('emptyState');
                this.statusIndicator = document.getElementById('statusIndicator');
                this.statusText = document.getElementById('statusText');

                // Metrics
                this.lastLatencyEl = document.getElementById('lastLatency');
                this.retrievalTimeEl = document.getElementById('retrievalTime');
                this.cacheStatusEl = document.getElementById('cacheStatus');
                this.totalQueriesEl = document.getElementById('totalQueries');

                this.sendButton.onclick = () => this.sendMessage();
                this.textInput.onkeydown = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                };
            }

            async checkHealth() {
                try {
                    this.updateStatus('connecting', 'Checking...');
                    const res = await fetch(`${API_BASE}/`);
                    if (res.ok) {
                        this.updateStatus('connected', 'Online');
                    } else {
                        this.updateStatus('error', 'API Error');
                    }
                } catch (e) {
                    this.updateStatus('error', 'Offline');
                    console.error(e);
                }
            }

            updateStatus(state, text) {
                this.statusIndicator.className = `status-indicator ${state}`;
                this.statusText.textContent = text;
            }

            async sendMessage() {
                const text = this.textInput.value.trim();
                const k = parseInt(document.getElementById('kInput').value) || 10;
                const useCache = document.getElementById('cacheInput').checked;

                if (!text) return;

                this.textInput.value = '';
                this.appendMessage('user', text);
                this.emptyState.style.display = 'none';
                this.updateStatus('connecting', 'Retrieving...');

                const startTime = performance.now();

                try {
                    const response = await fetch(`${API_BASE}/query/graphrag`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                            // No API Key header
                        },
                        body: JSON.stringify({
                            query: text,
                            k: k,
                            use_cache: useCache
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const data = await response.json();
                    const totalTime = (performance.now() - startTime).toFixed(0);

                    // Update Metrics
                    this.metrics.queries++;
                    this.totalQueriesEl.textContent = this.metrics.queries;
                    this.lastLatencyEl.textContent = `${totalTime}ms`;
                    this.retrievalTimeEl.textContent = `${(data.retrieval_time * 1000).toFixed(0)}ms`;

                    const hit = data.cached;
                    this.cacheStatusEl.textContent = hit ? 'HIT' : 'MISS';
                    this.cacheStatusEl.style.color = hit ? '#22c55e' : '#ef4444';

                    this.appendMessage('agent', data.answer, hit);
                    this.updateStatus('connected', 'Online');

                } catch (e) {
                    console.error(e);
                    this.appendMessage('agent', 'Error connecting to GraphRAG service.');
                    this.updateStatus('error', 'Error');
                }
            }

            appendMessage(role, text, isCacheHit = false) {
                const div = document.createElement('div');
                div.className = `message ${role}`;

                let content = text;
                if (role === 'agent' && isCacheHit !== undefined) {
                    const badge = isCacheHit ? '<span class="badge hit">CACHE HIT</span>' : '<span class="badge miss">CACHE MISS</span>';
                    content = `<div>${badge}</div><div style="margin-top:8px">${text}</div>`;
                }

                div.innerHTML = content;
                this.chatMessages.appendChild(div);
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }
        }

        window.client = new GraphRAGClient();

        async function clearCache() {
            if (confirm('Clear Redis Cache?')) {
                try {
                    await fetch(`${API_BASE}/cache/clear`, { method: 'POST' });
                    alert('Cache cleared!');
                } catch (e) { alert('Failed to clear cache'); }
            }
        }
    </script>
</body>

</html>

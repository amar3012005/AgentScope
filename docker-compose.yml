# docker-compose.yml

version: '4.3'

services:
  # ============================================================
  # PIPELINE API
  # ============================================================
  pipeline-api:
    build:
      context: .
      dockerfile: docker/pipeline/Dockerfile
    image: graphrag-pipeline:${VERSION:-latest}
    container_name: graphrag-pipeline
    restart: unless-stopped
    ports:
      - "8004:8000"
    volumes:
      - pipeline_data:/app/data
      - pipeline_jobs:/app/_jobs
    environment:
      # Config file
      - CONFIG_FILE=/app/config.yaml
      # API Key for securing the API
      - API_KEY=${API_KEY}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}

      # Qdrant (MUST be set - no defaults)
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QDRANT_PORT=${QDRANT_PORT:-443}

      # Neo4j
      - NEO4J_URI=${NEO4J_URI:-bolt://your-neo4j-server.com:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}

      # BGE-M3 Service (if still using)
      - BGE_M3_API_KEY=${BGE_M3_API_KEY}
      - BGE_M3_SERVICE_URL=${BGE_M3_SERVICE_URL}
      - BGE_M3_MODEL_ID=${BGE_M3_MODEL_ID}
    labels:
      - "coolify.managed=true"
      - "coolify.name=Pipeline API"
      - "coolify.fqdn=rag-pipeline.api.blaiq.ai"
      - "coolify.port=8000"
      - "coolify.type=application"
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

    networks:
      - graphrag-network
      - coolify
      - psg4oc884sscc40w0k40oscg

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

    # Health check is defined in Dockerfile

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # RETRIEVER API
  # ============================================================
  retriever-api:
    build:
      context: .
      dockerfile: docker/retriever/Dockerfile
    image: graphrag-retriever:${VERSION:-latest}
    container_name: graphrag-retriever
    restart: unless-stopped
    ports:
      - "8005:8001"
    volumes:
      - retriever_jobs:/app/_jobs
    environment:
      # Config file
      - CONFIG_FILE=/app/config.yaml

      # API Key for securing the API
      - API_KEY=${API_KEY}

      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}

      # Qdrant
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QDRANT_HOST=${QDRANT_HOST:-}
      - QDRANT_PORT=${QDRANT_PORT:-443}

      # Neo4j
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}

      # BGE-M3
      - BGE_M3_API_KEY=${BGE_M3_API_KEY}
      - BGE_M3_SERVICE_URL=${BGE_M3_SERVICE_URL}
      - BGE_M3_MODEL_ID=${BGE_M3_MODEL_ID}
    labels:
      - "coolify.managed=true"
      - "coolify.name=Retriever API"
      - "coolify.fqdn=rag-retriever.api.blaiq.ai"
      - "coolify.port=8001"
      - "coolify.type=application"
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

    depends_on:
      - pipeline-api

    networks:
      - graphrag-network
      - coolify
      - psg4oc884sscc40w0k40oscg

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    # Health check is defined in Dockerfile

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # 260107-BundB Jun: add healthcheck
    healthcheck:
      test: [ "CMD-SHELL", "/app/.venv/bin/python -c \"import socket; s = socket.socket(); s.settimeout(3); s.connect(('localhost', 8001)); s.close()\" || exit 1" ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

networks:
  graphrag-network:
    driver: bridge
  coolify:
    external: true

  # !IMPORTANT: Use external network for Qdrant (psg4oc884sscc40w0k40oscg)
  psg4oc884sscc40w0k40oscg:
    external: true
    name: psg4oc884sscc40w0k40oscg

volumes:
  pipeline_data:
    driver: local
  pipeline_jobs:
    driver: local
  retriever_jobs:
    driver: local

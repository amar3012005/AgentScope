# docker/docker-compose.dev.yml

version: '3.8'

services:
  pipeline-api:
    platform: linux/amd64
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      - qdrant
      - neo4j

  retriever-api:
    platform: linux/amd64
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      - qdrant
      - neo4j

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # http://localhost:6333
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - graphrag-network

  neo4j:
    image: neo4j:5
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # http://localhost:7474 (Browser)
      - "7687:7687" # bolt://localhost:7687
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    networks:
      - graphrag-network

networks:
  graphrag-network:
    # 베이스 파일과 이름만 같게 맞추면 merge 됨
    driver: bridge

volumes:
  qdrant_storage:
  neo4j_data:
